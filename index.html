<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Craftmine</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="blocker">
    <div id="menu">
      <h1>Craftmine</h1>
      <p>Minecraft-style sandbox: mine, build, survive.</p>
      <button id="startBtn">Start Game</button>
      <p class="hint">WASD move, Shift sprint, Space jump, Mouse look, Left click mine, Right click place, 1-6 or wheel switch block.</p>
    </div>
  </div>

  <div id="hud">
    <div id="stats"></div>
    <div id="message"></div>
  </div>

  <div id="crosshair"></div>
  <div id="hotbar"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="./game.js"></script>
</body>
</html>
