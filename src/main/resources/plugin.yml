name: CraftmineOneVOne
version: 1.0.0
main: com.craftmine.onevone.OneVOnePlugin
api-version: "1.21"
author: Craftmine
commands:
  duel:
    description: Play a 1v1 duel.
    usage: /duel <join|leave|status|setlobby|setspawn1|setspawn2|force|reload>
    aliases: [onevone, 1v1]
permissions:
  onevone.admin:
    description: Admin controls for the duel plugin.
    default: op
